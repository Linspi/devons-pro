apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-app-deployment
  namespace: devops
  labels:
    app: spring-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-app
  template:
    metadata:
      labels:
        app: spring-app
    spec:
      containers:
      - name: spring-app
        image: mon-app-spring:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: spring-app-config
        - secretRef:
            name: spring-app-secret
---
apiVersion: v1
kind: Service
metadata:
  name: spring-app-service
  namespace: devops
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
  selector:
    app: spring-app
